<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main>
        <h1>✅Basic HTML and CSS Quiz</h1>
        <form action="">
            <div class="quiz-item">
                <label form="q1">1. What does the acronym CSS stand for?</label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="quiz-item">
                <label form="q2">2. How are id and class attributes selected in CSS?</label>
                <textarea id="q2" name="q2">
            </div>     
            <div>   
                <label form="q3">3. Which of the following is a valid CSS comment?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled></option>
                    <option value="a">A. &lt;!-- This is a comment--&gt;</option>
                    <option value="b">B. /* This is a comment */</option>
                    <option value="c">C. // This is a comment</option>
                </select>
            </div>
            <div class="quiz-item">
                <label form="q1">4. What is the bottom margin given this declaration?</label>
                <input type="text" id="q1" name="q1">
            </div>
        </form>
    </main>

</body>

</html>
